  componentMetadata:
    id: TMFC005
    name: ProductInventory
    version: 1.0.4
    description: The Product  Inventory component is responsible for storage and exposure
      of products that are assigned to and used by Parties. This component has functionality
      that enables creation of inventory items, inventory organization, inventory
      search or filter, inventory monitoring and tracking, inventory control and inventory
      auditing. The minimum check to be performed upon inventory item creation or
      update is for global consistency with related Product Catalog information.
    publicationDate: 2024-06-27
    status: specified
    functionalBlock: CoreCommerce
    owners:
    - email: Redacted
      name: Redacted
      url: Redacted
    maintainers:
    - name: Redacted
      email: components@tmforum.org
      url: Redacted
    eTOMs:
    - 1.2.11|Product_Inventory_Management|v24.0
    - 1.1.19|Loyalty_Program_Management|v24.0
    - 1.1.19.2|Loyalty_Program_Operation|v24.0
    - 1.1.19.2.5|Manage_Loyalty_Program_Account|v24.0
    - 1.1.19.2.7|Provide_Loyalty_Program_Operation_Report|v24.0
    functionalFrameworkFunctions:
