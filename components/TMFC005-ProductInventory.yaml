    - 197|Customer_Product_Storage|v24.0
    - 198|Customer_Loyalty_Score_Balance_Management|v24.0
    - 237|Customer_Loyalty_Communication|v24.0
    - 361|Contract_Implementation|v24.0
    - 362|Contract_Searching|v24.0
    - 363|Contract_Storage|v24.0
    SIDs:
    - Product_Domain|Product_and_Offering_Instance_ABE|Product_ABE|v25.0
    - Product_Domain|ProductOfferingInstance_ABE|v25.0
    - Product_Domain|Loyalty_ABE|Loyalty_Program_ABE|v25.0
