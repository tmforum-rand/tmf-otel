  componentMetadata:
    id: TMFC002
    name: ProductOrderCaptureAndValidation
    version: 2.1.0
    description: This component captures what a customer wants to order based on the
      CSP's Product Catalog.  It enables configuration of the product offerings and
      products desired, provides quotes, checks the eligibility of the customer order,
      and completes it with information needed such as the related parties or associated
      billing account and the delivery appointment. This component owns quote management,
      order capture and validation, using dedicated components (eg Offering Configurator,
      Service Qualification, Party Management) when needed. After the delivery of
      the customer product order items, this component is also in charge of the commercial
      closure of the order. It includes update of the Product Inventory (status and
      starting/end date of tariffs and discounts) and potential commercial rules control
      (eg receipt of the contract document signed by the customer).
    publicationDate: 2024-11-12
    status: specified
    functionalBlock: CoreCommerce
    owners:
    - email: Redacted
      name: Redacted
      url: Redacted
    maintainers:
    - name: Redacted
      email: components@tmforum.org
      url: Redacted
    eTOMs:
