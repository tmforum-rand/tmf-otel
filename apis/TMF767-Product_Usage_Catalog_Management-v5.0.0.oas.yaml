openapi: 3.0.1
info:
  title: Product Usage Catalog Management
  description: >-
    The TMF767 Product Usage Catalog Management API provides a standardized mechanism for Product
    Usage Catalog management such as the creation, update, retrieval of a collection of Product
    Usage Specification. A Product Usage Specification is catalog representation of a usage of a
    Product Specification. 


    Note : management of the Product Usage entity is under TMF635 Product Usage Management API.


    Copyright © TM Forum 2025. All Rights Reserved
  version: 5.0.0
  x-generation-tooling-version: v8.6.3
  x-generation-data-model-version: unknown
  x-generation-date: '2026-03-02T16:30:14.927Z'
  x-api-id: TMF767
  license:
    name: Apache License 2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0'
servers:
  - url: '{apiRoot}/tmf-api/productUsageCatalogManagement/v5/'
