            path:
              type: string
              description: >-
                A Json Pointer or a Json Path relative to the API root node that points to the
                resource acting as the source for streaming content to the export destination
                specified by the ExportJob. Defaults to the API’s root node. Using the JSON Pointer
                resp. JSON Path with reference to the API root guarantees that the path cannot point
                to a resource outside the scope of this API, e.g. to export some resource managed by
                a different API.
              example: /productUsage
            query:
              type: string
              description: >-
                Used to scope the exported data. Identical to GET filter construct using the API’s
                node defined by path as base. Defaults to requesting all resources of the node
                defined by the path.
            status:
              $ref: '#/components/schemas/JobStateType'
            url:
              type: string
              format: uri
              description: >-
                URL pointing at the location for the exported file. The URL sould be of the form
                file://host/path where host is the fully qualified domain name of the system on
                which the path is accessible, and path is a hierarchical directory path of the form
                directory/directory/…​/name. Other schemes can also be supported, e.g. 'ftp' and
                'http', preferably with their TLS encrypted variants 'sftp' resp 'https'.
            id:
              type: string
              description: unique identifier for export job
      discriminator:
        propertyName: '@type'
        mapping:
          ExportJob: '#/components/schemas/ExportJob'
