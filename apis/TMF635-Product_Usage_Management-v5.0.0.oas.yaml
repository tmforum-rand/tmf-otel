openapi: 3.0.1
info:
  title: Product Usage Management
  description: >-
    The TMF635 Product Usage Management API provides a standardized mechanism for Product Usage
    management such as the creation, update, retrieval of a Product Usage or of a collection of
    Product Usage. A Product Usage entity represents the structured report of a service that has
    been delivered, guided to a product, used and is considered billable. Each Product Usage entity
    is defined by a corresponding Product Usage Specification, which standardizes what type of usage
    occurred (e.g., voice, data session, API call) and its associated characteristics (e.g.,
    duration, data consumption, correlation identifier). TMF767 Product Usage Catalog Management API
    is responsible for managing Product Usage Specifications that represents a catalog view of the
    targeted Product Usage comprised of characteristics specifications which define all the
    attributes known for the particular usage.


    Copyright © TM Forum 2025. All Rights Reserved
