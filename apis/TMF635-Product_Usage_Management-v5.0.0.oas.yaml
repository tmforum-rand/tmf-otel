    ExportJob:
      allOf:
        - $ref: '#/components/schemas/Entity'
        - type: object
          description: Represents a task used to export resources to a file
          properties:
            completionDate:
              type: string
              format: date-time
              description: Data at which the job was completed
            contentType:
              type: string
              description: >-
                The format of the exported data. This value should be according to the IANA standard
                list of media types. Default is 'application/json'.
            creationDate:
              type: string
              format: date-time
              description: Date at which the job was created
            errorLog:
              type: string
              description: >-
                Path to file or stream where errors encountered during the job processing can be
