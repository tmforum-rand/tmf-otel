    ThresholdJob:
      allOf:
        - $ref: '#/components/schemas/Entity'
        - type: object
          description: >-
            The Threshold Job is the operational entity to execute a threshold (a set of threshold
            rules). As part of the definition of a Threshold Job, a scope of monitored objects is
            provided and a schedule for the threshold evaluation is determined.
          properties:
            adminState:
              $ref: '#/components/schemas/AdminStateEnum'
            creationDate:
              type: string
              format: date-time
              description: >-
                Timestamp indicating when the Threshold Job was originally created in the
                Performance Management system.
            executionState:
              type: string
              description: >-
                The current runtime state of the Threshold Job. Supported states: 'Active' - The job
                is currently active and executing threshold evaluation. 'Suspended' - The job is
                temporarily stopped but can be resumed. 'Failed' - The job stopped due to a failure.
                'Completed' - The job has finished its execution successfully and is no longer
                active.
            granularity:
              type: string
              description: >-
                Defines the evaluation granularity of the Threshold Job (e.g., G_5MN, G_15MN,
                G_30MN, G_1H). It specifies the periodic time interval at which KPIs are assessed
                against threshold rules.
            id:
              type: string
              description: >-
                Unique identifier of the Threshold Job, used to reference and manage it within the
                Threshold Management system.
            jobPriority:
              type: integer
              format: int32
              description: >-
                Relative priority level assigned to the Threshold Job. Higher priority jobs may be
                executed or scheduled ahead of lower priority jobs.
            lastUpdate:
              type: string
              format: date-time
              description: Timestamp of the most recent update or modification to the Threshold Job definition.
            monitoredObjectsCriteria:
              type: array
              items:
                $ref: '#/components/schemas/MonitoredObjectsCriteria'
              description: >-
                Criteria that define the scope of monitored objects (resources, services, or
                customers) to which the Threshold Job applies.
            performanceThreshold:
              $ref: '#/components/schemas/ThresholdRef'
            scheduleDefinition:
              $ref: '#/components/schemas/ScheduleDefinition'
            trackingRecord:
              type: string
              description: >-
                Optional field to store tracking or correlation information related to the Threshold
                Job (e.g., audit trails, external references, or operator notes).
      discriminator:
        propertyName: '@type'
