            ThresholdRule A base entity for concrete definition of thresholds. This datatype is
            abstract
          properties:
            measurement:
              $ref: '#/components/schemas/PerformanceMeasurementRef'
            consequence:
              type: array
              items:
                $ref: '#/components/schemas/Consequence'
              description: >-
                A threshold crossing or a threshold ceased to be crossing results in a Performance
                consequence.
            perfAlarmSpecThresholdCrossingDescription:
              type: string
              description: >-
                Defines the specification for threshold crossing alarms, including severity, type,
                probable cause, and additional context used when generating alarms.
            performanceAlarmSpecification:
              $ref: '#/components/schemas/PerformanceAlarmSpecification'
            condition:
              type: string
              description: >-
                A concrete threshold may have two possible values: 'Raise' - a threshold was crossed
                or 'Clear' - a threshold ceased crossing
