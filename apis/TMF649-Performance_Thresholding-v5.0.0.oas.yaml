    HourRange:
      type: object
      description: >-
        Represents a range of hours within a single day. The range can have only a start time, only
        an end time, or both. Times must be specified in 24-hour HH:mm format.
      properties:
        startHour:
          description: >-
            The beginning of the hour range, expressed in 24-hour HH:mm format (e.g., 09:00 for 9
            AM, 17:30 for 5:30 PM).
          type: string
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
          example: '09:00'
        endHour:
          description: >-
            The end of the hour range, expressed in 24-hour HH:mm format (e.g., 12:00 for noon,
            23:59 for one minute before midnight).
          type: string
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
          example: '12:00'
