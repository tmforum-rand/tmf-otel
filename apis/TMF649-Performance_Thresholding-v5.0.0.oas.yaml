              type: string
              description: >-
                A word, term, or phrase by which a Performance threshold rule is known and
                distinguished from other threshold rules
            severity:
              type: string
              description: >-
                A threshold can be generated in different severity levels. A crossing for each level
                may require a different condition and possibly trigger a different consequence. The
                supported severity levels are equivalent to the possible severity level of alarms.
                Examples are CRITICAL,MAJOR,MINOR,WARNING,INTERMEDIATE
