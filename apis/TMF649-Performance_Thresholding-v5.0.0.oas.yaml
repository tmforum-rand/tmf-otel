components:
  schemas:
    Addressable:
      type: object
      description: Base schema for addressable entities
      properties:
        href:
          type: string
          description: Hyperlink reference
        id:
          type: string
          description: unique identifier
    AdminStateEnum:
      enum:
        - LOCKED
        - UNLOCKED
        - SHUTTING_DOWN
      type: string
      description: >-
        Enumeration of administrative states of a resource. Possible values indicate whether the
        resource is locked, unlocked, or shutting down.
    AlgorithmThresholdRule:
      allOf:
        - $ref: '#/components/schemas/ThresholdRule'
        - type: object
          description: A threshold rule that is a reference to an algorithm
          properties:
            algorithmParams:
              type: array
              description: Collection of algorithm Params
              items:
                $ref: '#/components/schemas/Characteristic'
            algorithmRef:
              type: string
              description: The href of the algorithm for threshold rule
    AlgorithmThresholdRule_FVO:
      allOf:
        - $ref: '#/components/schemas/ThresholdRule_FVO'
        - type: object
          description: A threshold rule that is a reference to an algorithm
          properties:
            algorithmParams:
              type: array
              description: Collection of algorithm Params
              items:
                $ref: '#/components/schemas/Characteristic_FVO'
            algorithmRef:
              type: string
              description: The href of the algorithm for threshold rule
    BooleanArrayCharacteristic:
      allOf:
        - $ref: '#/components/schemas/Characteristic'
        - type: object
          description: A characteristic which value is an array of Boolean(s).
          properties:
            value:
              type: array
              description: A characteristic which value is an array of Boolean(s).
              items:
                type: boolean
                description: Characteristic item boolean value
    BooleanArrayCharacteristic_FVO:
      allOf:
        - $ref: '#/components/schemas/Characteristic_FVO'
        - type: object
          description: A characteristic which value is an array of Boolean(s).
          properties:
            value:
              type: array
              description: A characteristic which value is an array of Boolean(s).
              items:
                type: boolean
                description: Characteristic item boolean value
          required:
            - value
    BooleanCharacteristic:
      allOf:
        - $ref: '#/components/schemas/Characteristic'
        - type: object
          description: A characteristic which value is a Boolean.
          properties:
            value:
              type: boolean
              description: Value of the characteristic
    BooleanCharacteristic_FVO:
      allOf:
        - $ref: '#/components/schemas/Characteristic_FVO'
        - type: object
          description: A characteristic which value is a Boolean.
          properties:
            value:
              type: boolean
              description: Value of the characteristic
          required:
            - value
    Characteristic:
      allOf:
        - $ref: '#/components/schemas/Extensible'
        - type: object
          description: >-
            Describes a given characteristic of an object or entity through a name/value pair. This
            is an abstract base class, the actual value is in one of the strongly-typed subclasses :
