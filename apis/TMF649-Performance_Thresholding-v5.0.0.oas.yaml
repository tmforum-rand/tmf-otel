openapi: 3.0.1
info:
  title: Performance Thresholding
  description: >-
    **TMF API Reference : TMF - 649 Performance Threshold**

    Performance Threshold Management is about identifying exceptional behavior of monitored
    performance indicators. Threshold Management is built as an additional layer on top of standard
    Performance Monitoring. A PM Producing application that is already producing indicators is asked
    to set a Threshold over a Performance Indicator and raise an alarm when this Threshold is
    crossed. When the indicator returns to its normal behavior an alarm clear alarm event is sent.

    Possible actions are:

    *creating, retrieving, modifying and deleting threshold rules

    *creating, retrieving, modifying and deleting thresholds

    *creating, retrieving, modifying and deleting thresholdjobs

    The Performance Thresholding API provides a standardized client interface to Service and
    Resource Performance Management Systems for manipulating (create/update/delete)
    threshold/violation/exception rules. It enables alarms/notifications on exceptions and
    scheduling of threshold/violation/exception evaluation.
